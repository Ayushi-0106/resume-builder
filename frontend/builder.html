<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Builder - Resume Builder</title>
    <link rel="stylesheet" href="css/builder.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <h1>AI Resume Builder</h1>
                </div>
                <div class="header-actions">
                    <button class="btn-secondary" id="saveBtn">
                        <i class="fas fa-save"></i> Save
                    </button>
                    <button class="btn-primary" id="downloadBtn">
                        <i class="fas fa-download"></i> Download PDF
                    </button>
                    <button class="btn-logout" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </header>
        
        <div class="main-content">
            <!-- Sidebar - Form Sections -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h3>Resume Sections</h3>
                </div>
                
                <nav class="section-nav">
                    <button class="nav-item active" data-section="personal">
                        <i class="fas fa-user"></i> Personal Info
                    </button>
                    <button class="nav-item" data-section="summary">
                        <i class="fas fa-file-alt"></i> Summary
                    </button>
                    <button class="nav-item" data-section="experience">
                        <i class="fas fa-briefcase"></i> Experience
                    </button>
                    <button class="nav-item" data-section="education">
                        <i class="fas fa-graduation-cap"></i> Education
                    </button>
                    <button class="nav-item" data-section="skills">
                        <i class="fas fa-tools"></i> Skills
                    </button>
                    <button class="nav-item" data-section="projects">
                        <i class="fas fa-project-diagram"></i> Projects
                    </button>
                    <button class="nav-item" data-section="template">
                        <i class="fas fa-palette"></i> Template
                    </button>
                </nav>
            </aside>
            
            <!-- Form Content -->
            <main class="form-content">
                <!-- Personal Info Section -->
                <section id="personal" class="form-section active">
                    <h2>Personal Information</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" name="name" placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="john@example.com">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone</label>
                            <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567">
                        </div>
                        <div class="form-group">
                            <label for="location">Location</label>
                            <input type="text" id="location" name="location" placeholder="City, State">
                        </div>
                        <div class="form-group full-width">
                            <label for="linkedin">LinkedIn</label>
                            <input type="url" id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/johndoe">
                        </div>
                        <div class="form-group full-width">
                            <label for="github">GitHub</label>
                            <input type="url" id="github" name="github" placeholder="https://github.com/johndoe">
                        </div>
                    </div>
                </section>
                
                <!-- Summary Section -->
                <section id="summary" class="form-section">
                    <h2>Professional Summary</h2>
                    <div class="form-group">
                        <label for="summaryText">Summary</label>
                        <textarea id="summaryText" name="summary" rows="4" placeholder="Write a compelling professional summary..."></textarea>
                        <div class="ai-assistance">
                            <button class="btn-ai" data-type="summary">
                                <i class="fas fa-magic"></i> Get AI Suggestions
                            </button>
                        </div>
                    </div>
                </section>
                
                <!-- Experience Section -->
                <section id="experience" class="form-section">
                    <h2>Professional Experience</h2>
                    <div id="experienceList">
                        <!-- Experience items will be added here -->
                    </div>
                    <button class="btn-add" id="addExperience">
                        <i class="fas fa-plus"></i> Add Experience
                    </button>
                </section>
                
                <!-- Education Section -->
                <section id="education" class="form-section">
                    <h2>Education</h2>
                    <div id="educationList">
                        <!-- Education items will be added here -->
                    </div>
                    <button class="btn-add" id="addEducation">
                        <i class="fas fa-plus"></i> Add Education
                    </button>
                </section>
                
                <!-- Skills Section -->
                <section id="skills" class="form-section">
                    <h2>Skills</h2>
                    <div class="form-group">
                        <label for="skillsInput">Skills (comma-separated)</label>
                        <textarea id="skillsInput" name="skills" rows="4" placeholder="JavaScript, Python, React, Node.js, MongoDB..."></textarea>
                        <div class="ai-assistance">
                            <button class="btn-ai" data-type="skills">
                                <i class="fas fa-magic"></i> Get AI Suggestions
                            </button>
                        </div>
                    </div>
                </section>
                
                <!-- Projects Section -->
                <section id="projects" class="form-section">
                    <h2>Projects</h2>
                    <div id="projectsList">
                        <!-- Project items will be added here -->
                    </div>
                    <button class="btn-add" id="addProject">
                        <i class="fas fa-plus"></i> Add Project
                    </button>
                </section>
                
                <!-- Template Section -->
                <section id="template" class="form-section">
                    <h2>Choose Template</h2>
                    <div class="template-grid">
                        <div class="template-option" data-template="minimal">
                            <div class="template-preview minimal-preview">
                                <div class="preview-header">
                                    <div class="preview-name">John Doe</div>
                                    <div class="preview-title">Software Engineer</div>
                                </div>
                            </div>
                            <label>Minimal</label>
                        </div>
                        <div class="template-option" data-template="professional">
                            <div class="template-preview professional-preview">
                                <div class="preview-header">
                                    <div class="preview-name">John Doe</div>
                                    <div class="preview-title">Software Engineer</div>
                                </div>
                            </div>
                            <label>Professional</label>
                        </div>
                        <div class="template-option" data-template="modern">
                            <div class="template-preview modern-preview">
                                <div class="preview-header">
                                    <div class="preview-name">John Doe</div>
                                    <div class="preview-title">Software Engineer</div>
                                </div>
                            </div>
                            <label>Modern</label>
                        </div>
                    </div>
                </section>
            </main>
            
            <!-- Preview Panel -->
            <aside class="preview-panel">
                <div class="preview-header">
                    <h3>Live Preview</h3>
                    <button class="btn-refresh" id="refreshPreview">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
                <div class="preview-content" id="resumePreview">
                    <!-- Resume preview will be rendered here -->
                </div>
            </aside>
        </div>
    </div>
    
    <!-- AI Suggestions Modal -->
    <div id="aiModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>AI Suggestions</h3>
                <button class="modal-close" id="closeAiModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div id="aiSuggestions">
                    <!-- AI suggestions will be displayed here -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Templates -->
    <script id="experienceTemplate" type="text/template">
        <div class="experience-item" data-id="{{id}}">
            <div class="item-header">
                <h4>Experience {{index}}</h4>
                <button class="btn-remove" onclick="removeExperience('{{id}}')">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" name="title" placeholder="Software Engineer">
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" name="company" placeholder="Tech Company Inc.">
                </div>
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="month" name="startDate">
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input type="month" name="endDate" placeholder="Present">
                </div>
                <div class="form-group full-width">
                    <label>Description</label>
                    <textarea name="description" rows="3" placeholder="Describe your role and achievements..."></textarea>
                    <div class="ai-assistance">
                        <button class="btn-ai" data-type="experience">
                            <i class="fas fa-magic"></i> Get AI Suggestions
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </script>
    
    <script id="educationTemplate" type="text/template">
        <div class="education-item" data-id="{{id}}">
            <div class="item-header">
                <h4>Education {{index}}</h4>
                <button class="btn-remove" onclick="removeEducation('{{id}}')">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Degree</label>
                    <input type="text" name="degree" placeholder="Bachelor of Science">
                </div>
                <div class="form-group">
                    <label>Institution</label>
                    <input type="text" name="institution" placeholder="University Name">
                </div>
                <div class="form-group">
                    <label>Graduation Year</label>
                    <input type="number" name="graduationYear" placeholder="2023">
                </div>
                <div class="form-group">
                    <label>GPA (Optional)</label>
                    <input type="number" name="gpa" step="0.01" min="0" max="4" placeholder="3.8">
                </div>
            </div>
        </div>
    </script>
    
    <script id="projectTemplate" type="text/template">
        <div class="project-item" data-id="{{id}}">
            <div class="item-header">
                <h4>Project {{index}}</h4>
                <button class="btn-remove" onclick="removeProject('{{id}}')">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Project Name</label>
                    <input type="text" name="name" placeholder="E-commerce Website">
                </div>
                <div class="form-group">
                    <label>Technologies</label>
                    <input type="text" name="technologies" placeholder="React, Node.js, MongoDB">
                </div>
                <div class="form-group full-width">
                    <label>Description</label>
                    <textarea name="description" rows="3" placeholder="Describe your project..."></textarea>
                    <div class="ai-assistance">
                        <button class="btn-ai" data-type="projects">
                            <i class="fas fa-magic"></i> Get AI Suggestions
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </script>
    
    <script src="js/builder.js"></script>
</body>
</html>
